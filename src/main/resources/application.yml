server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shopping_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  charset:
    console: UTF-8
  level:
    com.shopping: info
    org.apache.ibatis: warn

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: shopping-platform-jwt-secret-key-2024-this-is-a-long-enough-key-for-hs256
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh_cn

file:
  upload-dir: uploads
  access-url: http://localhost:8080/uploads

ai:
  api-url: https://api.deepseek.com/v1/chat/completions
  api-key: sk-48cb004c03f4499bab9fc68c8bcdb838
  model: deepseek-v4-flash
  timeout: 30000
  max-tokens: 2000